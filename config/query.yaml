## 检索式设计逻辑

| 层次 | 目的 | 设计原则 |
|---|---|---|
| 对象词 | 锁定技术对象 | 覆盖 Transformer 主流变体，避免遗漏 |
| 场景词 | 限定应用领域 | 使用上位词（semiconductor）而非具体应用（defect detection）|
| 排除词 | 提高查准率 | 排除同名异义（power transformer）和无关应用场景 |

