# 检索式配置文件 (Query Configuration)

> 数据库：Web of Science Core Collection
> 检索日期：2026-04-14
> 最终版本：v2-final

---

## 当前生效检索式 (v2-final)

```yaml
version: v2-final
date: 2026-04-14
result_count: 643

query:
  database: "Web of Science Core Collection"
  indexes:
    - SCI-EXPANDED
    - SSCI
    - CPCI-S
  time_range:
    start: 2015
    end: 2025
  document_types:
    - Article
    - Review
    - Proceedings Paper
  language: English

search_strategy:
  object_terms:
    description: "Transformer 架构及其变体"
    terms:
      - "Transformer"
      - "Vision Transformer"
      - "ViT"
      - "Swin Transformer"
      - "Autoformer"
      - "Informer"
      - "PatchTST"

  scenario_terms:
    description: "半导体制造领域"
    terms:
      - "semiconductor"
      - "wafer"
      - "integrated circuit"
      - "lithography"
      - "semiconductor packaging"
      - "wafer fabrication"
      - "chip manufacturing"

  exclusion_terms:
    description: "排除无关领域"
    terms:
      - "power transformer"
      - "voltage"
      - "current transformer"
      - "medical image"
      - "NLP"
      - "natural language"
      - "traffic"
      - "power load"
      - "smart grid"
      - "distribution network"
      - "financial"

wos_advanced_query: |
  TS=("Transformer" OR "Vision Transformer" OR "ViT" OR "Swin Transformer"
     OR "Autoformer" OR "Informer" OR "PatchTST")
  AND TS=("semiconductor" OR "wafer" OR "integrated circuit" OR "lithography"
     OR "semiconductor packaging" OR "wafer fabrication" OR "chip manufacturing")
  NOT TS=("power transformer" OR "voltage" OR "current transformer"
     OR "medical image" OR "NLP" OR "natural language"
     OR "traffic" OR "power load" OR "smart grid"
     OR "distribution network" OR "financial")
```

