## 版本迭代历史

### v0 (初始检索)

```yaml
version: v0
date: 2026-04-10
result_count: 105

query: |
  TS=("Transformer" OR "Vision Transformer" OR "ViT")
  AND TS=("semiconductor manufacturing" OR "wafer defect detection" OR "chip defect")

issues:
  - "过度依赖具体应用场景词（defect detection）"
  - "查全率过低，遗漏大量相关文献"
  - "场景词过于狭窄"

change_reason: "初始检索仅 105 条，经人工核查发现大量漏检，需放宽场景限定"
```

### v1 (放宽场景)

```yaml
version: v1
date: 2026-04-12
result_count: 512

query: |
  TS=("Transformer" OR "Vision Transformer" OR "ViT" OR "Swin Transformer"
     OR "Autoformer" OR "Informer" OR "PatchTST")
  AND TS=("semiconductor" OR "wafer" OR "integrated circuit" OR "lithography")
  NOT TS=("power transformer" OR "voltage" OR "current transformer"
     OR "medical image" OR "NLP" OR "natural language")

changes:
  added_object_terms:
    - "Swin Transformer"
    - "Autoformer"
    - "Informer"
    - "PatchTST"
  expanded_scenario_terms:
    - "semiconductor"
    - "wafer"
    - "integrated circuit"
    - "lithography"
  removed_specific_terms:
    - "semiconductor manufacturing"
    - "wafer defect detection"
    - "chip defect"

issues:
  - "仍包含部分电力系统相关噪声"
  - "smart grid、distribution network 等干扰词未排除"

change_reason: "查全率提升，但查准率下降，需补充排除词"
```

### v2-final (平衡版本)

```yaml
version: v2-final
date: 2026-04-14
result_count: 643

changes_from_v1:
  added_exclusion_terms:
    - "traffic"
    - "power load"
    - "smart grid"
    - "distribution network"
    - "financial"

validation:
  sample_check: "随机抽取 10 条，9 条高度相关，1 条边缘相关"
  precision_estimate: "90%+"
  recall_estimate: "覆盖主流 Transformer 变体 + 半导体制造核心场景"

change_reason: "新增 5 个排除词，消除电力系统、交通预测、金融等领域的噪声文献"
```

